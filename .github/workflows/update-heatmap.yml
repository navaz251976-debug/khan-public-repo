name: Update Heatmap

on:
  schedule:
    - cron: '*/15 11-23 * * 1-5'   # every 15 mins, 6AM–6PM ET (11:00–23:00 UTC) Mon–Fri
  workflow_dispatch:            # manual trigger button in GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore prices cache
        uses: actions/cache@v4
        with:
          path: prices_cache.parquet
          key: prices-${{ github.run_id }}
          restore-keys: prices-

      - name: Install dependencies
        run: pip install -r requirements.txt tzdata

      - name: Generate heatmap
        run: python heatmap.py
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Publish to docs/
        run: |
          mkdir -p docs
          cp heatmap.html docs/index.html

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: update heatmap $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
